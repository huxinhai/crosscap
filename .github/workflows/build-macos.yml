name: build-macos

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            artifact_name: crosscap-darwin-arm64
          - runner: macos-13
            arch: x64
            artifact_name: crosscap-darwin-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:smoke
      - run: pnpm run package:release
      - run: tar -czf "${{ matrix.artifact_name }}.tar.gz" -C release package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz
